[tool.ruff]
indent-width = 4
line-length = 80
exclude = ["gen", "cs-env", "node_modules", "static", "build", "htmlcov"]

[tool.ruff.format]
quote-style = "single"
docstring-code-format = true

[tool.ruff.lint]
select = ["E", "F", "I", "D"]
ignore = [
    "D100", # undocumented-public-module: The codebase lacks hundreds of module docstrings.
    "D101", # undocumented-public-class: The codebase lacks hundreds of class docstrings.
    "D104", # undocumented-public-package: The codebase lacks hundreds of package docstrings.

    # Infeasible: Conflicts with Ruff's default Google style docstring rules (D211, D212).
    "D203", # one-blank-line-before-class: Incompatible with Google style (D211).
    "D213", # multi-line-summary-second-line: Incompatible with Google style (D212).

    "E501", # line-too-long: The codebase has many long strings/comments; fixing all manually is infeasible.

    # Infeasible: Tests heavily rely on wildcard imports (e.g., from internals.core_enums import *).
    "F403", # undefined-local-with-import-star: Tests rely heavily on wildcard imports.
    "F405", # undefined-local-with-import-star-usage: Tests rely heavily on wildcard imports.
]

[tool.ruff.lint.pydocstyle]
convention = "google"
